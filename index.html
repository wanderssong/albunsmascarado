<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Galeria Wandersson Gonçalves</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        :root {
            --bg: #080808;
            --surface: rgba(22, 22, 22, 0.82);
            --surface-strong: #151515;
            --red: #ff1f1f;
            --red-soft: rgba(255, 31, 31, 0.45);
            --text: #ffffff;
            --muted: #b9b9b9;
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 0%, rgba(255, 0, 0, 0.16), transparent 32%),
                radial-gradient(circle at 90% 18%, rgba(255, 255, 255, 0.08), transparent 26%),
                linear-gradient(180deg, #050505 0%, #111 45%, #070707 100%);
            font-family: Arial, sans-serif;
            color: var(--text);
            overflow-x: hidden;
            user-select: none;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 75%);
            z-index: -1;
        }

        header {
            position: relative;
            text-align: center;
            padding: 42px 20px 30px;
            background: #111;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        header::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -90px;
            width: 520px;
            height: 180px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255, 0, 0, 0.22), transparent 70%);
            filter: blur(16px);
            pointer-events: none;
        }

        header img {
            position: relative;
            z-index: 1;
            width: clamp(180px, 22vw, 290px);
            max-height: 150px;
            object-fit: contain;
            margin-bottom: 14px;
            filter: drop-shadow(0 16px 26px rgba(0, 0, 0, 0.75));
        }

        h1 {
            position: relative;
            z-index: 1;
            font-size: clamp(1.45rem, 3vw, 2.2rem);
            color: var(--text);
            margin: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1::after {
            content: "";
            display: block;
            width: 78px;
            height: 3px;
            background: var(--red);
            margin: 13px auto 0;
            border-radius: 999px;
            box-shadow: 0 0 20px var(--red-soft);
        }

        .search-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            margin-bottom: 18px;
            text-align: center;
            padding: 18px 16px;
            margin: 0;
            background: rgba(8, 8, 8, 0.78);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .search-bar input {
            padding: 15px 20px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: min(90%, 520px);
            font-size: 1em;
            background: rgba(30, 30, 30, 0.92);
            color: white;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 18px 50px rgba(0, 0, 0, 0.24);
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: rgba(255, 0, 0, 0.55);
            background: #202020;
            box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.12), 0 18px 50px rgba(0, 0, 0, 0.3);
        }

        .albums {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
            width: min(1220px, 100%);
            margin: 0 auto;
            padding: 70px 22px 70px;

        }

        .album {
            min-height: 360px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            opacity: 1;
            transform: none;
            transform-style: preserve-3d;
            box-shadow: 0 18px 55px rgba(0, 0, 0, 0.38);
            transition: transform .25s ease, box-shadow .25s ease;
            will-change: transform, opacity;
        }

        .album.show-3d {
            opacity: 1;
            transform: none;
        }

        .album.is-front {
            transform: none;
            border-color: rgba(255, 255, 255, .08);
            box-shadow: 0 12px 30px rgba(0, 0, 0, .25);
        }

        .album:hover {
            transform: translateY(-4px);
        }

        .album img {
            width: 100%;
            height: 100%;
            min-height: 360px;
            object-fit: cover;
            display: block;
            transform: scale(1.04);
            transition: transform 0.7s ease, filter 0.4s ease;
        }

        .album:hover img,
        .album.is-front img {
            transform: scale(1.12);
            filter: contrast(1.05) saturate(1.08);
        }

        .album::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.05) 20%, rgba(0, 0, 0, 0.20) 50%, rgba(0, 0, 0, 0.86) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .album-title {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 52px;
            z-index: 3;
            color: white;
            font-weight: 800;
            font-size: 1.15rem;
            line-height: 1.2;
            text-align: left;
            text-shadow: 0 3px 18px rgba(0, 0, 0, 0.8);
        }

        .album-info {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 18px;
            z-index: 3;
            display: inline-flex;
            width: fit-content;
            max-width: calc(100% - 36px);
            padding: 8px 12px;
            border-radius: 999px;
            color: #f5f5f5;
            font-size: 0.82rem;
            line-height: 1.2;
            background: rgba(0, 0, 0, 0.54);
            border: 1px solid rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(8px);
        }

        .photo-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
            width: min(1250px, 100%);
            margin: 0 auto;
            padding: 26px 20px 80px;
        }

        .photo-container {
            position: relative;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.42);
            animation: fadeIn 0.7s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 1;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .photo-container img.photo {
            width: 100%;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.38;
            max-width: 60%;
            pointer-events: none;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.65));
        }

        .protect-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
        }

        .floating-button-with-text {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 100px;
            height: 100px;
            z-index: 9999;
            filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.45));
        }

        .floating-button-with-text button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: var(--red);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 24px rgba(255, 0, 0, 0.58);
        }

        .rotating-circle {
            width: 100px;
            height: 100px;
            animation: none;
        }

        .rotating-circle text {
            font-size: 5px;
            fill: white;
            letter-spacing: 2px;
            font-weight: bold;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: linear-gradient(180deg, #1d1d1d, #101010);
            padding: 24px;
            border-radius: 18px;
            width: min(92vw, 380px);
            color: white;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.6);
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            margin: 10px 0;
            padding: 13px;
            background: #292929;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .modal-content button {
            background: var(--red);
            color: white;
            border: none;
            padding: 13px 20px;
            margin-top: 10px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
        }

        .modal-content button:hover,
        #btnVoltar:hover {
            filter: brightness(1.08);
        }

        .close-btn {
            background: #444 !important;
        }

        #gallerySection h1 {
            text-align: center;
            margin: 28px 20px 10px;
        }

        #btnVoltar {
            position: fixed;
            top: 18px;
            left: 18px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 11px 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (max-width: 700px) {
            header {
                padding: 30px 14px 22px;
            }

            header img {
                width: clamp(180px, 62vw, 250px);
                max-height: 130px;
            }

            .albums {
                grid-template-columns: 1fr;
                gap: 22px;
                padding: 55px 16px 112px;
                margin-top: 12px;
                perspective: 900px;
            }

            .album,
            .album img {
                min-height: 330px;
            }

            .album-title {
                font-size: 1.05rem;
                bottom: 54px;
            }

            .floating-button-with-text {
                width: 88px;
                height: 88px;
                right: 14px;
                bottom: 14px;
            }

            .rotating-circle {
                width: 88px;
                height: 88px;
            }

            .floating-button-with-text button {
                width: 44px;
                height: 44px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }

            .album,
            .album.show-3d,
            .album.is-front {
                transform: none;
                border-color: rgba(255, 255, 255, .08);
                box-shadow: 0 12px 30px rgba(0, 0, 0, .25);
            }
        }
    </style>
</head>

            <button onclick="enviarWhatsApp()">Solicitar no WhatsApp</button>

        let currentAlbum = null;

        function filterAlbums() {
            const termo = document.getElementById('albumSearch').value.toLowerCase();
            document.querySelectorAll('.album').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(termo) ? '' : 'none';
            });
        }

        function openAlbum(key) {
            const album = albums[key];
            if (!album) return;

            document.querySelector('header').style.display = 'none';
            document.querySelector('.search-bar').style.display = 'none';
            document.getElementById('albumsList').style.display = 'none';
            document.getElementById('gallerySection').style.display = 'block';

            document.getElementById('albumTitle').innerText = album.title;

            const area = document.getElementById('photoArea');
            area.innerHTML = '';

            album.photos.forEach(f => {
                const div = document.createElement('div');
                div.className = 'photo-container';
                div.innerHTML = `
        <img class="photo" src="${f}" loading="lazy">
        <img class="watermark" src="albuns/logo.png" alt="Marca d'água">
        <div class="protect-layer"></div>
        `;
                area.appendChild(div);
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeGallery() {
            document.getElementById('gallerySection').style.display = 'none';
            document.querySelector('header').style.display = 'block';
            document.querySelector('.search-bar').style.display = 'block';
            document.getElementById('albumsList').style.display = 'grid';
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function enviarWhatsApp() {
            const nome = document.getElementById('nome').value;
            const evento = document.getElementById('evento').value;
            const data = document.getElementById('dataInput').value;
            const hora = document.getElementById('horaInput').value;

            const msg = `Olá, meu nome é ${nome}. Gostaria de um orçamento. Evento: ${evento}. Data: ${data}. Horário: ${hora}`;
            window.open('https://wa.me/5568996129443?text=' + encodeURIComponent(msg), '_blank');
        }



        function renderAlbums() {
            const container = document.getElementById("albumsList");
            container.innerHTML = "";

            const sortedAlbums = Object.entries(albums).sort((a, b) => {
                const [diaA, mesA, anoA] = a[1].data.split('/');
                const [diaB, mesB, anoB] = b[1].data.split('/');

                const dataA = new Date(`${anoA}-${mesA}-${diaA}`);
                const dataB = new Date(`${anoB}-${mesB}-${diaB}`);

                return dataB - dataA;
            });

            sortedAlbums.forEach(([key, album], index) => {
                const div = document.createElement("div");
                div.className = "album";

                if (index === 0) {
                    div.classList.add("is-front");
                }

                div.onclick = () => openAlbum(key);

                div.innerHTML = `
            <img src="${album.cover}" alt="${album.title}" loading="lazy" />
            <div class="album-title">${album.title}</div>
            <div class="album-info">📍 ${album.local} • 📅 ${album.data}</div>
        `;

                container.appendChild(div);
            });

            document.querySelectorAll('.album').forEach((card, i) => {
                setTimeout(() => card.classList.add('show-3d'), i * 120);
            });
        }


        renderAlbums();
    </script>
